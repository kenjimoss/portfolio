<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>kenji moss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      /* Fixed 1920x1080 canvas — sized independently of the webview viewport */
      #canvas {
        position: absolute;
        width: 1920px;
        height: 1080px;
        top: 0;
        left: 0;
        background: #ffffff;
        display: flex;
        justify-content: center;
        will-change: transform;
      }

      .columns-container {
        display: flex;
        gap: 121px;
        width: 1741px;
        height: 1080px;
        flex-shrink: 0;
      }

      .column {
        flex: 1;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      .column-strip {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        will-change: transform;
      }

      .cell {
        width: 100%;
        aspect-ratio: 1;
        background: #ffffff;
        margin-bottom: 121px;
        overflow: hidden;
      }

      .cell img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .name-backdrop {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #ffffff;
        z-index: 9;
      }

      .name-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Jura", sans-serif;
        font-weight: 300;
        font-size: 4rem;
        color: #4b4b4b;
        z-index: 10;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="canvas">
      <div class="columns-container" id="columns-container"></div>
      <div class="name-backdrop" id="name-backdrop"></div>
      <div class="name-overlay">kenji moss</div>
    </div>

    <script>
      const REPEATS = 3;
      const GAP_PX = 121; // matches CSS gap and cell margin-bottom

      const images = [
        '01-soonju-chair-full-front-transparent.png',
        '01-soonju-chair-hand.jpg',
        '01-soonju-object-cutout-01.png',
        '01-soonju-object-cutout-02.png',
        '01-soonju-object-cutout-03.png',
        '01-soonju-sketchbook-01.jpg',
        '01-soonju-sketchbook-02.jpg',
        '01-soonju-sketchbook-03.jpg',
        '01-soonju-sketchbook-04.jpg',
        '02-ashley-final-exterior-01.jpg',
        '02-ashley-final-exterior-02.jpg',
        '02-ashley-final-top.jpg',
        '02-ashley-final-upshot.jpg',
        '02-ashley-process-drawings.jpg',
        '02-ashley-process-model-01.jpg',
        '02-ashley-process-model-02.jpg',
        '02-ashley-process-model-03.jpg',
        '03-shundana-concept-diagram.png',
        '03-shundana-concept-model-01.jpg',
        '03-shundana-concept-model-02.jpg',
        '03-shundana-final-rendering.png',
        '04-libby-final-floor-plan.jpg',
        '04-libby-final-northeast-elevation.jpg',
        '04-libby-final-site-plan.jpg',
        '04-libby-final-south-elevation.jpg',
      ];

      const colImages = [[], [], [], [], [], []];
      images.forEach((img, i) => colImages[i % 6].push(img));

      const container = document.getElementById('columns-container');
      const offsets = new Array(6).fill(0);
      let oneSetHeights = new Array(6).fill(0);

      const columns = [];
      const strips = [];
      for (let i = 0; i < 6; i++) {
        const col = document.createElement('div');
        col.className = 'column';
        const strip = document.createElement('div');
        strip.className = 'column-strip';
        col.appendChild(strip);
        container.appendChild(col);
        columns.push(col);
        strips.push(strip);
      }

      function buildCells() {
        strips.forEach((strip, i) => {
          const imgs = colImages[i];
          for (let r = 0; r < REPEATS; r++) {
            imgs.forEach(src => {
              const cell = document.createElement('div');
              cell.className = 'cell';
              const img = document.createElement('img');
              img.src = `images/${src}`;
              img.alt = '';
              cell.appendChild(img);
              strip.appendChild(cell);
            });
          }
        });
      }

      function initSizes() {
        const colWidth = columns[0].getBoundingClientRect().width;
        const cellHeight = colWidth;
        const cellStep = cellHeight + GAP_PX;

        oneSetHeights = colImages.map(imgs => imgs.length * cellStep);

        const topPad = Math.max(0, (1080 - (3 * cellHeight + 2 * GAP_PX)) / 2);

        const backdrop = document.getElementById('name-backdrop');
        backdrop.style.width  = (2.5 * cellHeight + GAP_PX) + 'px';
        backdrop.style.height = (1.5 * cellHeight) + 'px';

        strips.forEach((strip, i) => {
          offsets[i] = oneSetHeights[i];
          strip.style.paddingTop = topPad + 'px';
          strip.style.transform = `translateY(-${offsets[i]}px)`;
        });
      }

      columns.forEach((col, i) => {
        col.addEventListener('wheel', (e) => {
          e.preventDefault();
          offsets[i] += e.deltaY;

          if (offsets[i] >= 2 * oneSetHeights[i]) offsets[i] -= oneSetHeights[i];
          if (offsets[i] < oneSetHeights[i]) offsets[i] += oneSetHeights[i];

          strips[i].style.transform = `translateY(-${offsets[i]}px)`;
        }, { passive: false });
      });

      buildCells();
      initSizes();

      // When loaded inside the tab browser, pan the canvas to match the tab window's screen position
      try {
        const { ipcRenderer } = require('electron');
        ipcRenderer.on('scroll-to', (e, { x, y }) => {
          document.getElementById('canvas').style.transform = `translate(-${x}px, -${y}px)`;
        });
      } catch (_) {
        // Running outside Electron (normal browser) — no panning needed
      }
    </script>
  </body>
</html>
