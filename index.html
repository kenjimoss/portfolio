<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>kenji moss</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #333;
        overflow: hidden;
      }

      #warp-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #grid-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: grid;
        grid-template-columns: repeat(80, 50px);
        grid-auto-rows: 50px;
        width: 4000px;
      }

      .cell img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        display: block;
      }

      .cell.hidden {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="warp-container">
      <div id="grid-container"></div>
    </div>

    <script>
      const images = [
        '01-soonju-chair-full-front.jpg',
        '01-soonju-chair-hand.jpg',
        '01-soonju-object-01.jpg',
        '01-soonju-object-02.jpg',
        '01-soonju-object-03.jpg',
        '01-soonju-sketchbook-01.jpg',
        '01-soonju-sketchbook-02.jpg',
        '01-soonju-sketchbook-03.jpg',
        '01-soonju-sketchbook-04.jpg',
        '02-ashley-final-exterior-01.jpg',
        '02-ashley-final-exterior-02.jpg',
        '02-ashley-final-top.jpg',
        '02-ashley-final-upshot.jpg',
        '02-ashley-process-drawings.jpg',
        '02-ashley-process-model-01.jpg',
        '02-ashley-process-model-02.jpg',
        '02-ashley-process-model-03.jpg',
        '03-shundana-concept-diagram.jpg',
        '03-shundana-concept-model-01.jpg',
        '03-shundana-concept-model-02.jpg',
        '03-shundana-final-rendering.jpg',
        '04-libby-final-floor-plan.jpg',
        '04-libby-final-northeast-elevation.jpg',
        '04-libby-final-site-plan.jpg',
        '04-libby-final-south-elevation.jpg',
        '05-valerie-deepmap-primary-matrix.jpg',
        '05-valerie-deepmap-primary-psychological.jpg',
        '05-valerie-deepmap-secondary-matrix.jpg',
        '05-valerie-deepmap-secondary-psychological.jpg',
        '06-matt-composition-study-01.jpg',
        '06-matt-composition-study-02.jpg',
        '06-matt-composition-study-03.jpg',
        '06-matt-composition-study-04.jpg',
        '06-matt-concept-model-01.jpg',
        '06-matt-concept-model-02.jpg',
        '06-matt-concept-model-03.jpg',
        '06-matt-final-axonometric.jpg',
        '06-matt-final-east-elevation.jpg',
        '06-matt-final-exterior.jpg',
        '06-matt-final-floorplan-01.jpg',
        '06-matt-final-floorplan-02.jpg',
        '06-matt-final-floorplan-03.jpg',
        '06-matt-final-floorplan-04.jpg',
        '06-matt-final-floorplan-05.jpg',
        '06-matt-final-floorplan-06.jpg',
        '06-matt-final-north-elevation.jpg',
        '06-matt-final-section-a.jpg',
        '06-matt-final-section-b.jpg',
        '06-matt-final-siteplan.jpg',
        '06-matt-process-drawing.jpg',
        '07-gesa-collective-floorplan.jpg',
        '07-gesa-collective-isometric.jpg',
        '07-gesa-collective-model-detail.jpg',
        '07-gesa-collective-model-full.jpg',
        '07-gesa-collective-section.jpg',
        '07-gesa-minimal-floorplan.jpg',
        '07-gesa-minimal-isometric.jpg',
        '07-gesa-minimal-section.jpg',
      ];

      const CELL_SIZE  = 50;
      const GRID_COLS  = 80;
      const GRID_ROWS  = 60;
      const GRID_WIDTH  = GRID_COLS * CELL_SIZE; // 4000px
      const GRID_HEIGHT = GRID_ROWS * CELL_SIZE; // 3000px

      const gridContainer = document.getElementById('grid-container');
      const cellElements  = []; // indexed [row * GRID_COLS + col]
      const cellState     = new Uint8Array(GRID_COLS * GRID_ROWS); // 0=hidden 1=visible

      for (let i = 0; i < GRID_COLS * GRID_ROWS; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        const img = document.createElement('img');
        img.src = `images/${images[i % images.length]}`;
        img.alt = '';
        img.loading = 'lazy';
        cell.appendChild(img);
        gridContainer.appendChild(cell);
        cellElements.push(cell);
        img.addEventListener('dblclick', () => openImage(img));
      }

      // Returns true if point (px, py) is inside the convex polygon.
      // Works for both CW and CCW vertex order by checking all cross
      // products share the same sign.
      function pointInPolygon(px, py, poly) {
        const n = poly.length;
        let sign = 0;
        for (let i = 0; i < n; i++) {
          const a = poly[i], b = poly[(i + 1) % n];
          const cross = (b.x - a.x) * (py - a.y) - (b.y - a.y) * (px - a.x);
          if (Math.abs(cross) < 1e-9) continue; // on edge
          const s = cross > 0 ? 1 : -1;
          if (sign === 0) sign = s;
          else if (s !== sign) return false;
        }
        return true;
      }

      // Last vertices received from __shapeUpdate, in normalized 0-1 coords.
      // null means no shape data yet — fall back to viewport rectangle.
      let lastVertices = null;

      function getPolygon() {
        const vW = window.innerWidth, vH = window.innerHeight;
        if (!lastVertices) {
          return [{ x: 0, y: 0 }, { x: vW, y: 0 }, { x: vW, y: vH }, { x: 0, y: vH }];
        }
        return lastVertices.map(v => ({ x: v.x * vW, y: v.y * vH }));
      }

      function updateVisibility() {
        const poly     = getPolygon();
        const vW       = window.innerWidth, vH = window.innerHeight;
        const gridLeft = vW / 2 - GRID_WIDTH  / 2;
        const gridTop  = vH / 2 - GRID_HEIGHT / 2;

        for (let row = 0; row < GRID_ROWS; row++) {
          for (let col = 0; col < GRID_COLS; col++) {
            const x0 = gridLeft + col * CELL_SIZE;
            const y0 = gridTop  + row * CELL_SIZE;
            const x1 = x0 + CELL_SIZE;
            const y1 = y0 + CELL_SIZE;

            const inside = (
              pointInPolygon(x0, y0, poly) &&
              pointInPolygon(x1, y0, poly) &&
              pointInPolygon(x1, y1, poly) &&
              pointInPolygon(x0, y1, poly)
            ) ? 1 : 0;

            const idx = row * GRID_COLS + col;
            if (inside !== cellState[idx]) {
              cellState[idx] = inside;
              if (inside) cellElements[idx].classList.remove('hidden');
              else        cellElements[idx].classList.add('hidden');
            }
          }
        }
      }

      window.__shapeUpdate = function(data) {
        lastVertices = (data.vertices && data.vertices.length > 0) ? data.vertices : null;
        updateVisibility();
      };

      window.addEventListener('resize', updateVisibility);

      // Run once on load using the viewport rectangle
      updateVisibility();

      // Lightbox
      let activeOverlay    = null;
      let overlayOriginRect = null;

      function openImage(imgEl) {
        if (activeOverlay) return;

        const r = imgEl.getBoundingClientRect();
        overlayOriginRect = { top: r.top, left: r.left, width: r.width, height: r.height };

        const overlay = document.createElement('div');
        overlay.style.cssText = `
          position: fixed;
          z-index: 100;
          overflow: hidden;
          top: ${r.top}px;
          left: ${r.left}px;
          width: ${r.width}px;
          height: ${r.height}px;
          transition: top 0.25s ease, left 0.25s ease, width 0.25s ease, height 0.25s ease;
        `;

        const copy = document.createElement('img');
        copy.src = imgEl.src;
        copy.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        overlay.appendChild(copy);
        document.body.appendChild(overlay);
        activeOverlay = overlay;

        requestAnimationFrame(() => requestAnimationFrame(() => {
          overlay.style.top    = '0';
          overlay.style.left   = '0';
          overlay.style.width  = window.innerWidth  + 'px';
          overlay.style.height = window.innerHeight + 'px';
        }));
      }

      function closeImage() {
        if (!activeOverlay) return;

        const overlay = activeOverlay;
        const rect    = overlayOriginRect;
        activeOverlay     = null;
        overlayOriginRect = null;

        overlay.style.top    = rect.top    + 'px';
        overlay.style.left   = rect.left   + 'px';
        overlay.style.width  = rect.width  + 'px';
        overlay.style.height = rect.height + 'px';

        overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
      }

      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImage(); });
    </script>
  </body>
</html>
