<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>kenji moss</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #000;
        overflow: hidden;
      }

      #warp-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #grid-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: grid;
        grid-template-columns: repeat(var(--grid-cols), var(--cell-size));
        grid-auto-rows: var(--cell-size);
      }

      .cell {
        overflow: hidden;
      }

      .cell img {
        width: var(--cell-size);
        height: var(--cell-size);
        object-fit: cover;
        display: block;
      }

      .cell.hidden {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="warp-container">
      <div id="grid-container"></div>
    </div>

    <script>
      const COLLECTIONS = {
        'collection_02_plan and section drawings': [
          '02_FLOOR PLAN.webp','02_SECTION.webp','03_PLAN_FLOOR 01.webp',
          '03_PLAN_FLOOR 02.webp','03_SECTIONS.webp','04_FLOOR PLAN.webp',
          '04_SECTION_A.webp','04_SECTION_B.webp','06_PLAN_FLOOR 01.webp',
          '06_PLAN_FLOOR 02.webp','06_PLAN_FLOOR 03.webp','06_PLAN_FLOOR 04.webp',
          '06_PLAN_FLOOR 05.webp','06_PLAN_FLOOR 06.webp','06_SECTION_A.webp',
          '06_SECTION_B.webp','07_PLAN_DIAGRAM 01.webp','07_PLAN_DIAGRAM 02.webp',
          '07_PLAN_FLOOR 02_OPTIMIZED.webp','07_PLAN_OPTIMIZED.webp',
          '07_SECTION_A_OPTIMIZED.webp','07_SECTION_DIAGRAM 01.webp',
          '07_SECTION_OPTIMIZED.webp','08_PLAN_FLOOR 00.webp','08_PLAN_FLOOR 01.webp',
          '08_PLAN_FLOOR 02.webp','08_PLAN_FLOOR 03.webp','08_PLAN_FLOOR 04.webp',
          '08_PLAN_FLOOR 05.webp','08_SECTION.webp','09_COMBINATION_01.webp',
          '09_COMBINATION_02.webp','09_SECTION_01_01.webp','09_SECTION_01_02.webp',
          '09_SECTION_01_03.webp','09_SECTION_01_04.webp','09_SECTION_01_05.webp',
          '09_SECTION_01_06.webp','09_SECTION_01_07.webp','09_SECTION_01_08.webp',
          '09_SECTION_01_09.webp','09_SECTION_02_01.webp','09_SECTION_02_02.webp',
          '09_SECTION_02_03.webp','09_SECTION_02_04.webp','09_SECTION_02_05.webp',
          '09_SECTION_02_06.webp','09_SECTION_02_07.webp','09_SECTION_02_08.webp',
          '09_SECTION_02_09.webp',
        ],
        'collection_05_furniture_original': [
          'furniture_01.avif','furniture_02.avif','furniture_03.avif',
          'furniture_04.avif','furniture_05.avif','furniture_06.avif',
          'furniture_07.avif','furniture_08.avif','furniture_09.avif',
          'furniture_10.avif','furniture_11.avif','furniture_12.avif',
          'furniture_13.avif','furniture_14.avif','furniture_15.avif',
          'furniture_16.avif','furniture_17.avif','furniture_18.avif',
          'furniture_19.avif','furniture_20.avif','furniture_21.avif',
          'furniture_22.avif','furniture_23.avif','furniture_24.avif',
          'furniture_25.avif','furniture_26.avif',
        ],
        'collection_04_fashion runways_original': [
          'dior_ss26_01.avif','dior_ss26_02.avif','dior_ss26_03.avif',
          'dior_ss26_04.avif','dior_ss26_05.avif',
          'iris van herpen_ss26_01.avif','iris van herpen_ss26_02.avif',
          'iris van herpen_ss26_03.avif','iris van herpen_ss26_04.avif',
          'iris van herpen_ss26_05.avif','issey miyake_ss26_01.avif',
          'issey miyake_ss26_02.avif','issey miyake_ss26_03.avif',
          'issey miyake_ss26_04.avif','issey miyake_ss26_05.avif',
          'schiaparelli_ss26_01.webp','schiaparelli_ss26_02.webp',
          'schiaparelli_ss26_03.webp','schiaparelli_ss26_04.webp',
          'schiaparelli_ss26_05.webp','schiaparelli_ss26_06.webp',
          'tamara ralph_ss26_01.webp','tamara ralph_ss26_02.webp',
          'tamara ralph_ss26_03.webp','tamara ralph_ss26_04.webp',
          'tamara ralph_ss26_05.webp','valentino_ss26_01.avif',
          'valentino_ss26_02.avif','valentino_ss26_03.avif',
          'valentino_ss26_04.avif','valentino_ss26_05.avif',
        ],
        'collection_03_contrast site images_01': [
          'IMG_0005.webp','IMG_0013.webp','IMG_0046.webp','IMG_0055.webp',
          'IMG_0062.webp','IMG_0068.webp','IMG_0098.webp','IMG_0108.webp',
          'IMG_0111.webp','IMG_0117.webp','IMG_0124.webp','IMG_0129.webp',
          'IMG_0164.webp','IMG_9879.webp','IMG_9882.webp','IMG_9883.webp',
          'IMG_9893.webp','IMG_9908.webp','IMG_9916.webp','IMG_9938.webp',
          'IMG_9972.webp','IMG_9974.webp','IMG_9976.webp','IMG_9981.webp',
          'IMG_9985.webp','IMG_9991.webp','IMG_9992.webp','IMG_9996.webp',
        ],
      };

      let currentCollection = 'collection_02_plan and section drawings';
      let images = COLLECTIONS[currentCollection];

      // Stepped cell sizes — pinch in / scroll down = smaller, pinch out / scroll up = larger
      const CELL_STEPS = [10, 25, 40, 55, 70];
      let stepIndex = 2;                     // start at 40px (middle)
      let cellSize  = CELL_STEPS[stepIndex];

      // Pre-create enough cells to cover the viewport at the smallest step (15px).
      // At larger steps the same cell count covers more area — always over-covered.
      const GRID_COLS  = Math.ceil(screen.availWidth  / CELL_STEPS[0]) + 4;
      const GRID_ROWS  = Math.ceil(screen.availHeight / CELL_STEPS[0]) + 4;
      const TOTAL_CELLS = GRID_COLS * GRID_ROWS;

      // Derived dimensions — updated by applyStep()
      let GRID_WIDTH  = GRID_COLS * cellSize;
      let GRID_HEIGHT = GRID_ROWS * cellSize;

      const gridContainer = document.getElementById('grid-container');
      const cellElements  = []; // indexed [row * GRID_COLS + col]
      const cellState     = new Uint8Array(TOTAL_CELLS); // 0=hidden 1=visible

      // Set initial CSS custom properties
      gridContainer.style.setProperty('--grid-cols', GRID_COLS);
      gridContainer.style.setProperty('--cell-size', cellSize + 'px');

      for (let i = 0; i < TOTAL_CELLS; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        const img = document.createElement('img');
        img.src = `images/${currentCollection}/${images[Math.floor(Math.random() * images.length)]}`;
        img.alt = '';
        img.loading = 'lazy';
        const zoom = 1 + Math.random() * 1.5;
        const rot  = Math.floor(Math.random() * 4) * 90;
        const ox   = Math.random() * 100;
        const oy   = Math.random() * 100;
        img.style.transform       = `scale(${zoom}) rotate(${rot}deg)`;
        img.style.transformOrigin = '50% 50%';
        img.style.objectPosition  = `${ox}% ${oy}%`;
        cell.appendChild(img);
        gridContainer.appendChild(cell);
        cellElements.push(cell);
        img.addEventListener('dblclick', () => openImage(img));
      }

      function applyStep(newIndex) {
        newIndex = Math.max(0, Math.min(CELL_STEPS.length - 1, newIndex));
        if (newIndex === stepIndex) return;
        stepIndex = newIndex;
        cellSize  = CELL_STEPS[stepIndex];
        GRID_WIDTH  = GRID_COLS * cellSize;
        GRID_HEIGHT = GRID_ROWS * cellSize;
        gridContainer.style.setProperty('--cell-size', cellSize + 'px');
        scheduleUpdate();
      }

      // Ray-casting point-in-polygon. Works for any simple polygon (convex or non-convex).
      function pointInPolygon(px, py, poly) {
        const n = poly.length;
        let inside = false;
        for (let i = 0, j = n - 1; i < n; j = i++) {
          const xi = poly[i].x, yi = poly[i].y;
          const xj = poly[j].x, yj = poly[j].y;
          if (((yi > py) !== (yj > py)) &&
              (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
            inside = !inside;
          }
        }
        return inside;
      }

      // Last shape data received from __shapeUpdate, in normalized 0-1 coords.
      // null means no shape data yet — fall back to viewport rectangle.
      let lastVertices = null;
      let lastHoles    = null; // array of hole polygons, each [{x,y},...], or null

      function getPolygon() {
        const vW = window.innerWidth, vH = window.innerHeight;
        if (!lastVertices) {
          return [{ x: 0, y: 0 }, { x: vW, y: 0 }, { x: vW, y: vH }, { x: 0, y: vH }];
        }
        return lastVertices.map(v => ({ x: v.x * vW, y: v.y * vH }));
      }

      function getHoles() {
        if (!lastHoles) return null;
        const vW = window.innerWidth, vH = window.innerHeight;
        return lastHoles.map(hole => hole.map(v => ({ x: v.x * vW, y: v.y * vH })));
      }

      let pendingUpdate = false;

      function scheduleUpdate() {
        if (!pendingUpdate) {
          pendingUpdate = true;
          requestAnimationFrame(() => {
            pendingUpdate = false;
            updateVisibility();
          });
        }
      }

      function updateVisibility() {
        const poly     = getPolygon();
        const holes    = getHoles(); // null or array of pixel-coord hole polygons
        const vW       = window.innerWidth, vH = window.innerHeight;
        const gridLeft = vW / 2 - GRID_WIDTH  / 2;
        const gridTop  = vH / 2 - GRID_HEIGHT / 2;

        // Polygon AABB for fast cell rejection
        let pMinX = Infinity, pMaxX = -Infinity;
        let pMinY = Infinity, pMaxY = -Infinity;
        for (const v of poly) {
          if (v.x < pMinX) pMinX = v.x;
          if (v.x > pMaxX) pMaxX = v.x;
          if (v.y < pMinY) pMinY = v.y;
          if (v.y > pMaxY) pMaxY = v.y;
        }

        for (let row = 0; row < GRID_ROWS; row++) {
          const y0 = gridTop  + row * cellSize;
          const y1 = y0 + cellSize;

          // Reject entire row if outside polygon AABB
          if (y1 <= pMinY || y0 >= pMaxY) {
            for (let col = 0; col < GRID_COLS; col++) {
              const idx = row * GRID_COLS + col;
              if (cellState[idx] !== 0) {
                cellState[idx] = 0;
                cellElements[idx].classList.add('hidden');
              }
            }
            continue;
          }

          for (let col = 0; col < GRID_COLS; col++) {
            const x0 = gridLeft + col * cellSize;
            const x1 = x0 + cellSize;

            let inside;
            // Reject cell if outside polygon AABB
            if (x1 <= pMinX || x0 >= pMaxX) {
              inside = 0;
            } else if (
              pointInPolygon(x0, y0, poly) &&
              pointInPolygon(x1, y0, poly) &&
              pointInPolygon(x1, y1, poly) &&
              pointInPolygon(x0, y1, poly)
            ) {
              // All 4 corners inside outer polygon — now check holes.
              // Hide the cell if any corner falls inside a hole.
              if (holes && holes.some(hole =>
                pointInPolygon(x0, y0, hole) ||
                pointInPolygon(x1, y0, hole) ||
                pointInPolygon(x1, y1, hole) ||
                pointInPolygon(x0, y1, hole)
              )) {
                inside = 0;
              } else {
                inside = 1;
              }
            } else {
              inside = 0;
            }

            const idx = row * GRID_COLS + col;
            if (inside !== cellState[idx]) {
              cellState[idx] = inside;
              if (inside) cellElements[idx].classList.remove('hidden');
              else        cellElements[idx].classList.add('hidden');
            }
          }
        }
      }

      window.__switchCollection = function(name) {
        if (!COLLECTIONS[name] || name === currentCollection) return;
        currentCollection = name;
        images = COLLECTIONS[name];
        cellElements.forEach(cell => {
          const img = cell.querySelector('img');
          img.src = `images/${currentCollection}/${images[Math.floor(Math.random() * images.length)]}`;
          const zoom = 1 + Math.random() * 1.5;
          const rot  = Math.floor(Math.random() * 4) * 90;
          const ox   = Math.random() * 100;
          const oy   = Math.random() * 100;
          img.style.transform       = `scale(${zoom}) rotate(${rot}deg)`;
          img.style.transformOrigin = '50% 50%';
          img.style.objectPosition  = `${ox}% ${oy}%`;
        });
      };

      window.__shapeUpdate = function(data) {
        lastVertices = (data.vertices && data.vertices.length > 0) ? data.vertices : null;
        lastHoles    = (data.holes    && data.holes.length    > 0) ? data.holes    : null;
        scheduleUpdate();
      };

      window.addEventListener('resize', scheduleUpdate);

      // Run once on load using the viewport rectangle
      scheduleUpdate();

      // Lightbox
      let activeOverlay    = null;
      let overlayOriginRect = null;

      function openImage(imgEl) {
        if (activeOverlay) return;

        const r = imgEl.getBoundingClientRect();
        overlayOriginRect = { top: r.top, left: r.left, width: r.width, height: r.height };

        const overlay = document.createElement('div');
        overlay.style.cssText = `
          position: fixed;
          z-index: 100;
          overflow: hidden;
          top: ${r.top}px;
          left: ${r.left}px;
          width: ${r.width}px;
          height: ${r.height}px;
          transition: top 0.25s ease, left 0.25s ease, width 0.25s ease, height 0.25s ease;
        `;

        const copy = document.createElement('img');
        copy.src = imgEl.src;
        copy.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        overlay.appendChild(copy);
        document.body.appendChild(overlay);
        activeOverlay = overlay;

        requestAnimationFrame(() => requestAnimationFrame(() => {
          overlay.style.top    = '0';
          overlay.style.left   = '0';
          overlay.style.width  = window.innerWidth  + 'px';
          overlay.style.height = window.innerHeight + 'px';
        }));
      }

      function closeImage() {
        if (!activeOverlay) return;

        const overlay = activeOverlay;
        const rect    = overlayOriginRect;
        activeOverlay     = null;
        overlayOriginRect = null;

        overlay.style.top    = rect.top    + 'px';
        overlay.style.left   = rect.left   + 'px';
        overlay.style.width  = rect.width  + 'px';
        overlay.style.height = rect.height + 'px';

        overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
      }

      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImage(); });

      // Mouse wheel — scroll down = smaller cells, scroll up = larger cells
      document.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.deltaY > 0) applyStep(stepIndex - 1);
        else              applyStep(stepIndex + 1);
      }, { passive: false });

      // Pinch — two-finger pinch in = smaller cells, pinch out = larger cells
      {
        const pinchPointers = new Map(); // pointerId → { x, y }
        let pinchStartDist = null;

        function pinchDist() {
          const [a, b] = [...pinchPointers.values()];
          const dx = a.x - b.x, dy = a.y - b.y;
          return Math.sqrt(dx * dx + dy * dy);
        }

        document.addEventListener('pointerdown', (e) => {
          if (e.pointerType !== 'touch') return;
          pinchPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          if (pinchPointers.size === 2) pinchStartDist = pinchDist();
        });

        document.addEventListener('pointermove', (e) => {
          if (!pinchPointers.has(e.pointerId)) return;
          pinchPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          if (pinchPointers.size < 2 || pinchStartDist === null) return;

          const dist  = pinchDist();
          const ratio = dist / pinchStartDist;

          if (ratio <= 0.7) {
            applyStep(stepIndex - 1);
            pinchStartDist = dist; // reset so next step requires another full threshold
          } else if (ratio >= 1.4) {
            applyStep(stepIndex + 1);
            pinchStartDist = dist;
          }
        });

        const endPinch = (e) => {
          pinchPointers.delete(e.pointerId);
          if (pinchPointers.size < 2) pinchStartDist = null;
        };
        document.addEventListener('pointerup',     endPinch);
        document.addEventListener('pointercancel', endPinch);
      }
    </script>
  </body>
</html>
